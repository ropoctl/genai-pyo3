[package]
name = "genai-pyo3"
version = "0.5.0"
edition = "2024"
publish = false
license = "MIT OR Apache-2.0"
description = "Python bindings for rust-genai"

[lib]
name = "_genai_pyo3"
crate-type = ["cdylib"]

[dependencies]
# Using the ropoctl fork's `integration/clearwing` branch. That branch
# is upstream `main` plus two pending PRs, each a single clean commit:
#   * `feat/bind-client-to-adapter-kind` — adds
#     `ClientBuilder::with_adapter_kind` so a Client configured with
#     provider-scoped resolvers is type-bound to that adapter.
#     Replaces the earlier `feat/default-adapter-kind` proposal after
#     upstream feedback on naming.
#   * `fix/capture-reasoning-without-effort` — emit the
#     `reasoning.summary="detailed"` opt-in on OpenAI Responses when
#     `capture_reasoning_content(true)` is set, independent of whether
#     `reasoning_effort` was also passed. Upstream previously gated
#     both together, silently defeating reasoning capture for callers
#     who only asked for the summary.
# Each feature lives on its own single-commit branch for clean upstream
# PRs; this integration branch is the combined artifact clearwing
# builds against. Flip back to upstream once both land there.
genai = { git = "https://github.com/ropoctl/rust-genai", rev = "a4fb12174d6c0ecec4089570e2652669857b4b9e" }
pyo3 = { version = "0.28", features = ["extension-module"] }
pyo3-async-runtimes = { version = "0.28", features = ["tokio-runtime"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
futures = "0.3"
serde_json = "1"
pythonize = "0.28"
# We need `reqwest::header::{HeaderMap, HeaderName, HeaderValue}` to hand
# custom default headers through to rust-genai's `WebConfig`. rust-genai
# already depends on reqwest 0.13 with "json", "stream", "gzip"; we take
# it here with `default-features = false` since we only use its header
# types, and the shared version resolves to the same compiled crate.
reqwest = { version = "0.13", default-features = false }
