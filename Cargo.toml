[package]
name = "genai-pyo3"
version = "0.6.1-rc.0"
edition = "2024"
publish = false
license = "MIT OR Apache-2.0"
description = "Python bindings for rust-genai"

[lib]
name = "_genai_pyo3"
crate-type = ["cdylib"]

[dependencies]
# Pin to a specific rust-genai commit so builds are reproducible.
# Temporarily track the ropoctl fork for the Anthropic Opus 4.7
# adaptive-thinking fix until it is fully upstreamed and released.
genai = { git = "https://github.com/ropoctl/rust-genai", rev = "dc43f09300255ca04b08e634c054eb197834b167" }
pyo3 = { version = "0.28", features = ["extension-module"] }
pyo3-async-runtimes = { version = "0.28", features = ["tokio-runtime"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
futures = "0.3"
serde_json = "1"
pythonize = "0.28"
# We need `reqwest::header::{HeaderMap, HeaderName, HeaderValue}` to hand
# custom default headers through to rust-genai's `WebConfig`. rust-genai
# already depends on reqwest 0.13 with "json", "stream", "gzip"; we take
# it here with `default-features = false` since we only use its header
# types, and the shared version resolves to the same compiled crate.
reqwest = { version = "0.13", default-features = false }
