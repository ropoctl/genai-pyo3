# Build and publish wheels for genai-pyo3.
#
# Triggers:
#   - push of a release tag (`v*.*.*` or `v*.*.*rc*`): build the full matrix,
#     publish to PyPI via OIDC trusted publishing.
#   - workflow_dispatch: build the full matrix, upload wheels as CI artifacts
#     only (no PyPI publish). Use this to verify a release before tagging.
#
# PyPI auth: OIDC trusted publishing. Registered on PyPI against this
# repository, `release.yml`, environment `pypi`. No API token secret is
# needed; the `release` job mints a short-lived OIDC token at upload time.

name: release

on:
  push:
    tags: ["v*.*.*", "v*.*.*rc*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # --- Linux x86_64 (manylinux2014) -------------------------------------------
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist --interpreter python${{ matrix.python-version }}
          manylinux: "2014"
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64-py${{ matrix.python-version }}
          path: dist/

  # --- Linux aarch64 (native ARM runner, no cross-compile) --------------------
  # Uses GitHub's free ubuntu-24.04-arm runner. aws-lc-sys builds natively
  # so no sccache / qemu / cross-toolchain pitfalls.
  linux-arm:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          args: --release --out dist --interpreter python${{ matrix.python-version }}
          manylinux: "2014"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64-py${{ matrix.python-version }}
          path: dist/

  # --- macOS: universal2 covers x86_64 + arm64 in one wheel -------------------
  macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: universal2-apple-darwin
          args: --release --out dist --interpreter python${{ matrix.python-version }}
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-py${{ matrix.python-version }}
          path: dist/

  # --- Linux x86_64 musl (Alpine et al.) ---------------------------------------
  # Native x86_64 runner; maturin-action builds in a musl container. aws-lc-sys
  # needs cmake at build time and the musl images don't all ship it, so the
  # before-script installs it with whichever package manager the image has.
  linux-musl:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-musl
          args: --release --out dist --interpreter python${{ matrix.python-version }}
          manylinux: musllinux_1_2
          before-script-linux: |
            if command -v apk >/dev/null 2>&1; then apk add --no-cache cmake make perl; fi
            if command -v apt-get >/dev/null 2>&1; then apt-get update && apt-get install -y cmake; fi
            if command -v yum >/dev/null 2>&1; then yum install -y cmake; fi
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-musl-x86_64-py${{ matrix.python-version }}
          path: dist/

  # --- Linux aarch64 musl (native ARM runner) ----------------------------------
  linux-musl-arm:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-unknown-linux-musl
          args: --release --out dist --interpreter python${{ matrix.python-version }}
          manylinux: musllinux_1_2
          before-script-linux: |
            if command -v apk >/dev/null 2>&1; then apk add --no-cache cmake make perl; fi
            if command -v apt-get >/dev/null 2>&1; then apt-get update && apt-get install -y cmake; fi
            if command -v yum >/dev/null 2>&1; then yum install -y cmake; fi
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-musl-aarch64-py${{ matrix.python-version }}
          path: dist/

  # --- Windows: x64 -----------------------------------------------------------
  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist --interpreter python${{ matrix.python-version }}
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-py${{ matrix.python-version }}
          path: dist/

  # --- Windows: arm64 (native windows-11-arm runner) ---------------------------
  # Official python.org ARM64 builds start at 3.11, so the matrix is narrower
  # than the other jobs.
  windows-arm:
    runs-on: windows-11-arm
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: arm64
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-pc-windows-msvc
          args: --release --out dist --interpreter python${{ matrix.python-version }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-arm64-py${{ matrix.python-version }}
          path: dist/

  # --- Source distribution (one per release) ----------------------------------
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/

  # --- Publish: runs only on a v*.*.* tag -------------------------------------
  release:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, linux-arm, linux-musl, linux-musl-arm, macos, windows, windows-arm, sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Inventory
        run: ls -la dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
